name: ci-test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python tests
        id: py
        shell: bash
        run: |
          if [[ -f "pyproject.toml" ]]; then
            if [[ -d "tests" ]] || find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.py.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        if: steps.py.outputs.run == 'true'
        run: python -m pip install --upgrade poetry

      - name: Install Python deps
        if: steps.py.outputs.run == 'true'
        run: poetry install --no-root

      - name: Run pytest
        if: steps.py.outputs.run == 'true'
        run: poetry run pytest

      - name: Skip Python tests
        if: steps.py.outputs.run != 'true'
        run: echo "No Python tests found; skipping."

      - name: Detect Node tests
        id: node
        shell: bash
        run: |
          if [[ -f "package.json" ]]; then
            if find . \
              -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.test.js" -o -name "*.test.jsx" \
              -o -name "*.spec.ts" -o -name "*.spec.tsx" -o -name "*.spec.js" -o -name "*.spec.jsx" \
              | grep -q .; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.node.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        if: steps.node.outputs.run == 'true'
        run: |
          if [[ -f "package-lock.json" ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run Node tests
        if: steps.node.outputs.run == 'true'
        run: npm test --silent

      - name: Skip Node tests
        if: steps.node.outputs.run != 'true'
        run: echo "No Node tests found; skipping."
