name: doc-gardening

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  doc-gardening:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run doc-gardening
        run: python3 scripts/doc_gardening.py

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: update doc gardening report"
          branch: "codex/doc-gardening-report"
          title: "docs: update doc gardening report"
          body: |
            ## Summary
            - Automated doc-gardening report update.

            ## Validation
            - [ ] Format/lint/typecheck completed (see `docs/CHECKS.md`)
            - [ ] Unit tests run (see `docs/TESTING.md`)
            - [ ] Build completed (see `docs/CHECKS.md`)
            - [ ] Manual checks completed (see `docs/CHECKS.md`)

            ## Docs
            - [ ] Relevant docs under `docs/` updated (or not needed)
            - [ ] `docs/exec-plans/` updated if scope/decisions changed

            ## Risk
            - Risks:
            - Rollback plan:
          labels: "doc-gardening"
          add-paths: |
            docs/reports/doc-gardening-report.md
