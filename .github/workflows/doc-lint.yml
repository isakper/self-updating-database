name: doc-lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run doc-lint
        run: python3 scripts/doc_lint.py
